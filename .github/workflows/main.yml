name: Kiyomaro Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,4,11 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run bot
        run: python bot.py
